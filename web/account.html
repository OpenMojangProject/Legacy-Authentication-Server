<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenMojangProject Web Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body>
    <h3>Upload Skin</h3>
    <form id="skinUpload">
        <div class="mb-3">
            <input class="form-control" type="file" id="skin">
          </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <br/>
        <br/>
        <h4>Command to run in game:</h4>
        <p id="command-vanilla">Vanilla: None yet</p>
        <p id="command-modded">Modded: None yet</p>
    </form>

    <hr/>

    <h3>Change Password</h3>
    <form id="changePassword">
        <div class="mb-3">
            <input class="form-control" type="password" id="newPassword">
          </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <hr/>

    <h3>Controls</h3>
    <button type="button" class="btn btn-primary" id="logout">Logout</button>

    <script src="js/app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
